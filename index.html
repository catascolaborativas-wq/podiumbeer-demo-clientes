<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PodiumBeer | Business Intelligence Cervecero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <style>
    :root {
      --pink: #e32c6c; --navy: #06232e; --gold: #f7c32f; --teal: #1eab9b; --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: #000; 
      color: var(--white);
      overflow-x: hidden;
    }
    .hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: url('assets/bg_cerveceria.jpg') center/cover no-repeat;
      z-index: -2;
    }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(6, 35, 46, 0.7); backdrop-filter: blur(8px);
      z-index: -1;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0; }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px; padding: 25px; margin-bottom: 20px;
    }
    input {
      width: 100%; padding: 15px; border-radius: 30px; border: none;
      background: rgba(255, 255, 255, 0.9); color: #000; font-size: 1.1rem;
      margin-bottom: 10px; outline: none;
    }
    .btn-main {
      background: linear-gradient(90deg, var(--pink), #ff5e95);
      color: white; border: none; padding: 15px 30px; border-radius: 30px;
      font-weight: bold; cursor: pointer; width: 100%;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    h2 { color: var(--gold); margin-bottom: 15px; font-size: 1.2rem; }
    .kpi-value { font-size: 2.5rem; font-weight: 800; color: var(--white); }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="overlay"></div>

  <div class="container">
    <header>
      <img src="assets/logo_podium.png" alt="PodiumBeer" style="height: 60px; margin-bottom: 10px;">
      <h1>Simulador de Alianza</h1>
      <p style="opacity: 0.8;">"No todas las medallas valen lo mismo"</p>
    </header>

    <div class="glass-card">
      <input type="text" id="breweryInput" placeholder="Escribe el nombre de tu cervecería (ej: Kross)...">
      <button class="btn-main" onclick="analizarCerveceria()">ACTUALIZAR ANÁLISIS DINÁMICO</button>
    </div>

    <div class="grid">
      <div class="glass-card">
        <h2>Índice de Autoridad (IAC)</h2>
        <div id="iacValue" class="kpi-value">--</div>
        <p style="font-size: 0.8rem; margin-top: 10px;">Puntaje basado en el prestigio del certamen y metal de la medalla.</p>
      </div>

      <div class="glass-card">
        <h2>El Espejo: Posición Competitiva</h2>
        <canvas id="radarChart"></canvas>
      </div>
    </div>

    <div class="glass-card" style="text-align: center;">
      <button class="btn-main" id="ctaBtn">AGENDAR DIAGNÓSTICO ESTRATÉGICO</button>
    </div>
  </div>

  <script>
    var allData = [];
    var radarChart;

    // 1. CARGA DINÁMICA: Lee el CSV directamente desde tu repo
    async function loadData() {
      try {
        const response = await fetch('BBDD_Medallero_Chile.csv');
        const text = await response.text();
        const rows = text.split('\n').slice(1);
        allData = rows.map(row => {
          const cols = row.split(';');
          return {
            certamen: cols[0],
            cerveceria: cols[4] ? cols[4].trim() : "",
            medalla: cols[8] ? cols[8].trim() : ""
          };
        }).filter(d => d.cerveceria !== "");
        console.log("Data cargada: " + allData.length + " registros.");
      } catch (e) {
        alert("Error cargando base de datos. Asegúrate de que el CSV esté en la raíz.");
      }
    }

    // 2. EL CEREBRO: Pesaje de medallas (IAC)
    function calcularIAC(nombre) {
      const pesosCertamen = {
        "World Beer Cup": 5, "Brussels Beer Challenge": 5, "Copa Cervezas de America": 4
      };
      const pesosMedalla = { "Oro": 3, "Plata": 2, "Bronce": 1 };
      
      let score = 0;
      allData.filter(d => d.cerveceria.toLowerCase() === nombre.toLowerCase())
             .forEach(m => {
               let w = pesosCertamen[m.certamen] || 2; // Default 2 para certámenes nuevos
               let p = pesosMedalla[m.medalla] || 1;
               score += (w * p);
             });
      return score;
    }

    function analizarCerveceria() {
      const name = document.getElementById('breweryInput').value;
      if(!name) return;
      
      const iac = calcularIAC(name);
      document.getElementById('iacValue').innerText = iac + " pts";
      
      updateRadar();
    }

    function updateRadar() {
      const ctx = document.getElementById('radarChart').getContext('2d');
      if(radarChart) radarChart.destroy();
      
      radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['Autoridad', 'Consistencia', 'Dominancia', 'Visibilidad', 'ROI'],
          datasets: [{
            label: 'Tu Cervecería',
            data: [Math.random()*10, Math.random()*10, Math.random()*10, Math.random()*10, Math.random()*10],
            backgroundColor: 'rgba(227, 44, 108, 0.2)',
            borderColor: '#e32c6c',
            borderWidth: 2
          }]
        },
        options: {
          scales: { r: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false } } }
        }
      });
    }

    window.onload = loadData;
  </script>
</body>
</html>
