<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Simulador de Alianza | Cervecería</title>
  <!-- Google Fonts: Inter (alternativa a SF Pro) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
      background: #000;
      overflow-x: hidden;
    }

    /* --- FONDO CON IMAGEN LOCAL + OVERLAY + VIÑETA --- */
    .hero-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }
    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay-color {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #06232E;
      opacity: 0.57;
      z-index: -1;
    }
    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 0;
    }

    /* --- CONTENEDOR PRINCIPAL (mobile-first, 390px máx) --- */
    .app-container {
      max-width: 390px;
      width: 100%;
      margin: 0 auto;
      padding: 44px 20px 40px 20px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Animación de entrada (stagger) */
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-item {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    /* --- HEADER --- */
    .header {
      text-align: center;
    }
    .h1-sim {
      font-size: 32px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }
    .h2-sim {
      font-size: 18px;
      font-weight: 500;
      color: #CFDEE0;
      margin-top: 8px;
    }

    /* --- GLASS CARD GENÉRICA (slider) --- */
    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 28px;
      padding: 16px;
    }

    /* --- SLIDER (gradiente en fill) --- */
    .slider-container {
      width: 100%;
    }
    .slider-track-wrapper {
      position: relative;
      margin: 20px 8px 32px 8px;
    }
    .slider-rail {
      width: 100%;
      height: 6px;
      background: #1E3A4A;
      border-radius: 50px;
      position: relative;
      cursor: pointer;
    }
    .slider-fill {
      position: absolute;
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, #06232E 0%, #FFFFFF 100%);
      width: 0%;
      pointer-events: none;
      transition: width 0.1s ease-out;
    }
    .slider-thumb {
      position: absolute;
      width: 24px;
      height: 24px;
      background: #FFFFFF;
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 0 0 0px rgba(255,255,255,0.3);
      transition: box-shadow 0.1s ease, left 0.15s ease;
      z-index: 3;
    }
    .slider-thumb:active {
      cursor: grabbing;
      box-shadow: 0 0 0 6px rgba(255,255,255,0.25);
    }
    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      padding: 0 4px;
    }
    .slider-labels span {
      font-size: 11px;
      font-weight: 500;
      color: #CFDEE0;
      text-align: center;
      width: 70px;
      line-height: 1.3;
    }
    .slider-labels span:first-child { text-align: left; }
    .slider-labels span:last-child { text-align: right; }

    /* --- TIER BUTTONS (pills) --- */
    .tier-buttons {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .tier-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 60px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 250ms ease;
    }
    .tier-btn.active {
      background: linear-gradient(90deg, #E40F63, #C32263);
      border: 1.5px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 12px #811347, 0 4px 12px rgba(0,0,0,0.3);
      transform: scale(1.02) translateY(-2px);
    }
    .tier-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tier-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #FFFFFF;
    }
    /* Colores específicos para iconos inactivos */
    .tier-btn:not(.active) .hopcone-icon {
      color: #FFFFFF;
      fill: #FFFFFF;
    }
    .tier-btn:not(.active) .medal-icon {
      color: #BC255D;
      fill: #BC255D;
    }
    .tier-btn:not(.active) .trophy-icon {
      color: #DBB937;
      fill: #DBB937;
    }
    .tier-btn.active .trophy-icon {
      fill: #DBB937;
    }
    .tier-btn.active .hopcone-icon,
    .tier-btn.active .medal-icon {
      fill: #FFFFFF;
    }

    /* --- METRICS CARD (glassmorphism severo) --- */
    .metrics-card {
      background: rgba(20, 30, 40, 0.55);
      backdrop-filter: blur(28px);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 32px;
      padding: 20px 12px;
    }
    .metrics-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .metric-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
    }
    .metric-icon {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metric-label {
      font-size: 11px;
      font-weight: 600;
      color: #CFDEE0;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .metric-value {
      font-size: 22px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.2;
    }
    @media (min-width: 370px) {
      .metric-value { font-size: 24px; }
    }

    /* --- TAGLINE CON BOMBILLA --- */
    .tagline-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 4px 0;
      transition: opacity 0.3s ease;
    }
    .tagline-text {
      font-size: 12px;
      font-weight: 500;
      color: #CFDEE0;
      font-style: italic;
      text-align: center;
    }
    .bulb-icon {
      width: 18px;
      height: 18px;
    }

    /* --- BOTÓN CTA (fucsia, glow, icono flecha+smartphone) --- */
    .cta-button {
      width: 100%;
      background: linear-gradient(90deg, #E40F63, #C32263);
      border: none;
      border-radius: 60px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(228, 15, 99, 0.5);
      transition: transform 0.1s ease, filter 0.1s ease;
    }
    .cta-button:active {
      transform: scale(0.97);
      filter: brightness(0.92);
    }
    .cta-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cta-text {
      font-size: 15px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <!-- Fondo con imagen real bg_cerveceria.jpg (coloca el archivo en la misma carpeta) -->
  <div class="hero-bg">
    <img src="bg_cerveceria.jpg" alt="Cervecería fondo">
  </div>
  <div class="overlay-color"></div>
  <div class="vignette"></div>

  <div class="app-container">
    <!-- 1. Header -->
    <div class="header animate-item" style="animation-delay: 0ms;">
      <div class="h1-sim">Simulador de Alianza</div>
      <div class="h2-sim">¿Cuál es tu producción anual?</div>
    </div>

    <!-- 2. Slider card (glass) -->
    <div class="glass-card animate-item" style="animation-delay: 80ms;">
      <div class="slider-container">
        <div class="slider-track-wrapper" id="sliderWrapper">
          <div class="slider-rail" id="sliderRail">
            <div class="slider-fill" id="sliderFill"></div>
          </div>
          <div class="slider-thumb" id="sliderThumb"></div>
        </div>
        <div class="slider-labels">
          <span>&lt;1000 hl</span>
          <span>1001–5000 hl</span>
          <span>5001–20000 hl</span>
          <span>20001–50000 hl</span>
          <span>&gt;50000 hl</span>
        </div>
      </div>
    </div>

    <!-- 3. Tier buttons (pills) -->
    <div class="tier-buttons animate-item" style="animation-delay: 160ms;" id="tierButtonsContainer">
      <!-- Explorer -->
      <div class="tier-btn" data-tier="explorer" id="tierExplorer">
        <div class="tier-icon">
          <svg class="hopcone-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3C9 5 7 8 7 11.5C7 14 8.5 16 10 17.5C11 18.5 12 19 12 21C12 19 13 18.5 14 17.5C15.5 16 17 14 17 11.5C17 8 15 5 12 3Z" fill="currentColor"/>
            <path d="M12 3C9.5 5.5 8 8.5 8 11.5C8 13.5 9 15 10.5 16.5C11.5 17.5 12 18.5 12 20" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <path d="M12 3C14.5 5.5 16 8.5 16 11.5C16 13.5 15 15 13.5 16.5C12.5 17.5 12 18.5 12 20" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <ellipse cx="12" cy="11.5" rx="1.8" ry="2.2" fill="currentColor"/>
          </svg>
        </div>
        <span class="tier-label">Explorer</span>
      </div>
      <!-- Podium -->
      <div class="tier-btn" data-tier="podium" id="tierPodium">
        <div class="tier-icon">
          <svg class="medal-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="3" width="8" height="3" fill="currentColor" rx="0.8"/>
            <circle cx="12" cy="11" r="7" fill="currentColor"/>
            <circle cx="12" cy="11" r="3.8" fill="rgba(0,0,0,0.3)"/>
          </svg>
        </div>
        <span class="tier-label">Podium</span>
      </div>
      <!-- Champion (activo por defecto) -->
      <div class="tier-btn active" data-tier="champion" id="tierChampion">
        <div class="tier-icon">
          <svg class="trophy-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 5H17V15C17 17.5 14.5 19 12 19C9.5 19 7 17.5 7 15V5Z" fill="currentColor"/>
            <path d="M5 5H7V8H5V5Z" fill="currentColor"/>
            <path d="M19 5H17V8H19V5Z" fill="currentColor"/>
            <rect x="11" y="9" width="2" height="3" fill="#1A2A38"/>
            <polygon points="12,9.5 13,11 11,11" fill="#DBB937"/>
            <path d="M10 19L14 19" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="tier-label">Champion</span>
      </div>
    </div>

    <!-- 4. Tarjeta de métricas -->
    <div class="metrics-card animate-item" style="animation-delay: 240ms;">
      <div class="metrics-row">
        <!-- Inversión mensual -->
        <div class="metric-col">
          <div class="metric-icon">
            <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="12" cy="18" rx="5" ry="6" fill="#DBB937" transform="rotate(-15 12 18)"/>
              <ellipse cx="12" cy="16" rx="5" ry="4" fill="#B88A1A" transform="rotate(-15 12 16)"/>
              <circle cx="22" cy="16" r="6" fill="#DBB937" stroke="#B88A1A" stroke-width="1.2"/>
              <text x="19" y="20" font-size="9" fill="#0A1A22" font-weight="bold" font-family="Arial">$</text>
            </svg>
          </div>
          <div class="metric-label">Inversión mensual</div>
          <div class="metric-value" id="inversionValue">$1,200 USD</div>
        </div>
        <!-- Optimización anual -->
        <div class="metric-col">
          <div class="metric-icon">
            <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="4,24 10,16 16,20 22,10 28,12" stroke="#DBB937" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="28,12 24,8 26,6" stroke="#DBB937" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="metric-label">Optimización anual</div>
          <div class="metric-value" id="optimizacionValue">$14,500 USD</div>
        </div>
        <!-- ROI colaborativo -->
        <div class="metric-col">
          <div class="metric-icon">
            <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M 8 20 A 12 12 0 1 1 24 20" stroke="#DBB937" stroke-width="3.5" fill="none" stroke-linecap="round"/>
              <circle cx="17" cy="20" r="2.5" fill="#DBB937"/>
              <text x="15.5" y="23" font-size="8" fill="#0A1A22" font-weight="bold" font-family="Arial">%</text>
            </svg>
          </div>
          <div class="metric-label">ROI colaborativo</div>
          <div class="metric-value" id="roiValue">65%</div>
        </div>
      </div>
    </div>

    <!-- 5. Tagline con bombilla -->
    <div class="tagline-wrapper animate-item" style="animation-delay: 320ms;" id="taglineWrapper">
      <div class="bulb-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 18H15V20C15 21.1 14.1 22 13 22H11C9.9 22 9 21.1 9 20V18Z" fill="#FFE48A"/>
          <path d="M12 2C8.13 2 5 5.13 5 9C5 11.38 6.19 13.47 8 14.74V16H16V14.74C17.81 13.47 19 11.38 19 9C19 5.13 15.87 2 12 2Z" fill="#FFE48A"/>
        </svg>
      </div>
      <span class="tagline-text" id="taglineText">Crecemos si tú creces: este presupuesto se ajusta a tu realidad…</span>
    </div>

    <!-- 6. Botón CTA -->
    <div class="animate-item" style="animation-delay: 400ms;">
      <button class="cta-button" id="ctaBtn">
        <div class="cta-icon">
          <svg width="22" height="22" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 14L2 16L5 18" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 16H7" stroke="#FFFFFF" stroke-width="2"/>
            <rect x="13" y="5" width="12" height="18" rx="2.5" fill="#3B6E8F" />
            <rect x="15" y="8" width="8" height="2" fill="#1C445A" />
            <circle cx="19" cy="19" r="1.5" fill="#0A1A22" />
            <rect x="16" y="11" width="6" height="4" fill="#2D5A78" rx="0.8"/>
          </svg>
        </div>
        <span class="cta-text">Agenda tu diagnóstico gratuito</span>
      </button>
    </div>
  </div>

  <script>
    // --- Datos de rangos (0: ≤1000, 1: 1001-5000, 2: 5001-20000, 3: 20001-50000, 4: >50000)
    const metricsTable = [
      { inversion: "$300 USD", optimizacion: "$3,600 USD", roi: "45%", suggestedTier: "explorer", tagline: "Explorer: primeros pasos, acompañamiento personalizado." },
      { inversion: "$600 USD", optimizacion: "$7,200 USD", roi: "55%", suggestedTier: "podium", tagline: "Podium: escalando con confianza y soporte." },
      { inversion: "$1,200 USD", optimizacion: "$14,500 USD", roi: "65%", suggestedTier: "champion", tagline: "Champion: rendimiento superior, beneficios exclusivos." },
      { inversion: "$2,000 USD", optimizacion: "$24,000 USD", roi: "70%", suggestedTier: "champion", tagline: "Champion: volumen industrial, alianza premium." },
      { inversion: "$3,500 USD", optimizacion: "$42,000 USD", roi: "75%", suggestedTier: "champion", tagline: "Champion: mega producción, máximas ventajas." }
    ];

    // Elementos DOM
    const sliderRail = document.getElementById('sliderRail');
    const sliderThumb = document.getElementById('sliderThumb');
    const sliderFill = document.getElementById('sliderFill');
    const tierExplorer = document.getElementById('tierExplorer');
    const tierPodium = document.getElementById('tierPodium');
    const tierChampion = document.getElementById('tierChampion');
    const inversionEl = document.getElementById('inversionValue');
    const optimizacionEl = document.getElementById('optimizacionValue');
    const roiEl = document.getElementById('roiValue');
    const taglineTextEl = document.getElementById('taglineText');

    let currentRangeIndex = 2;      // default 5001-20000 hl
    let currentTier = "champion";
    let allowAutoTier = true;
    let isDragging = false;
    let wrapperWidth = 0;

    const stepPositions = [0, 0.25, 0.5, 0.75, 1];

    function updateSliderVisual(index) {
      const percent = stepPositions[index] * 100;
      sliderFill.style.width = `${percent}%`;
      const thumbLeft = (percent / 100) * wrapperWidth;
      sliderThumb.style.left = `${thumbLeft}px`;
    }

    // Count-up animation (600ms ease-out)
    function animateValue(element, startVal, endVal, isCurrency = true, suffix = "") {
      const duration = 600;
      const startTime = performance.now();
      const startNum = parseFloat(String(startVal).replace(/[^0-9.-]+/g, ""));
      let endNum = parseFloat(String(endVal).replace(/[^0-9.-]+/g, ""));
      if (isNaN(startNum) || isNaN(endNum)) {
        element.innerText = endVal;
        return;
      }
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        let progress = Math.min(1, elapsed / duration);
        const easeOut = 1 - Math.pow(1 - progress, 2);
        let currentNum = startNum + (endNum - startNum) * easeOut;
        let formatted;
        if (isCurrency) {
          formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(currentNum);
          formatted = formatted.replace('$', '$ ') + (suffix ? " " + suffix : "");
        } else {
          formatted = Math.round(currentNum) + (suffix ? suffix : "");
        }
        element.innerText = formatted;
        if (progress < 1) requestAnimationFrame(update);
        else element.innerText = endVal;
      }
      requestAnimationFrame(update);
    }

    function getCurrentMetrics() {
      return metricsTable[currentRangeIndex];
    }

    function updateMetricsAndTagline(resetTagline = true) {
      const newVals = getCurrentMetrics();
      const oldInversion = inversionEl.innerText;
      const oldOptim = optimizacionEl.innerText;
      const oldRoi = roiEl.innerText;
      animateValue(inversionEl, oldInversion, newVals.inversion, true, "USD");
      animateValue(optimizacionEl, oldOptim, newVals.optimizacion, true, "USD");
      animateValue(roiEl, oldRoi, newVals.roi, false, "%");
      if (resetTagline) {
        taglineTextEl.style.opacity = '0';
        setTimeout(() => {
          taglineTextEl.innerText = newVals.tagline;
          taglineTextEl.style.opacity = '1';
        }, 150);
      }
    }

    function updateTierButtonsActive() {
      const btns = { explorer: tierExplorer, podium: tierPodium, champion: tierChampion };
      Object.keys(btns).forEach(tier => {
        if (tier === currentTier) btns[tier].classList.add('active');
        else btns[tier].classList.remove('active');
      });
    }

    function autoSelectTierFromRange() {
      if (allowAutoTier) {
        const suggested = metricsTable[currentRangeIndex].suggestedTier;
        if (suggested && suggested !== currentTier) {
          currentTier = suggested;
          updateTierButtonsActive();
          const newTag = metricsTable[currentRangeIndex].tagline;
          if (taglineTextEl.innerText !== newTag) {
            taglineTextEl.style.opacity = '0';
            setTimeout(() => {
              taglineTextEl.innerText = newTag;
              taglineTextEl.style.opacity = '1';
            }, 150);
          }
        }
      }
    }

    function setRangeByIndex(index, fromUser = true) {
      if (index === currentRangeIndex && fromUser) return;
      currentRangeIndex = index;
      updateSliderVisual(currentRangeIndex);
      if (fromUser) {
        allowAutoTier = true;
        autoSelectTierFromRange();
      }
      updateMetricsAndTagline(true);
    }

    // --- Slider interactivo (drag + snap) ---
    function getNearestStep(clientX) {
      const rect = sliderRail.getBoundingClientRect();
      let ratio = (clientX - rect.left) / rect.width;
      ratio = Math.min(Math.max(ratio, 0), 1);
      let distances = stepPositions.map(step => Math.abs(step - ratio));
      return distances.indexOf(Math.min(...distances));
    }

    function onDragStart(e) {
      isDragging = true;
      e.preventDefault();
      window.addEventListener('mousemove', onDragMove);
      window.addEventListener('mouseup', onDragEnd);
      window.addEventListener('touchmove', onDragMove);
      window.addEventListener('touchend', onDragEnd);
      sliderThumb.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
      if (!isDragging) return;
      let clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
      const rect = sliderRail.getBoundingClientRect();
      let ratio = (clientX - rect.left) / rect.width;
      ratio = Math.min(Math.max(ratio, 0), 1);
      sliderFill.style.width = `${ratio * 100}%`;
      let thumbX = ratio * wrapperWidth;
      sliderThumb.style.left = `${thumbX}px`;
    }

    function onDragEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      let clientX = e.clientX ?? (e.changedTouches ? e.changedTouches[0].clientX : 0);
      if (clientX === undefined) {
        const rect = sliderRail.getBoundingClientRect();
        clientX = rect.left + rect.width / 2;
      }
      const newIndex = getNearestStep(clientX);
      setRangeByIndex(newIndex, true);
      updateSliderVisual(currentRangeIndex);
      sliderThumb.style.cursor = 'grab';
      window.removeEventListener('mousemove', onDragMove);
      window.removeEventListener('mouseup', onDragEnd);
      window.removeEventListener('touchmove', onDragMove);
      window.removeEventListener('touchend', onDragEnd);
    }

    function initSlider() {
      const updateSize = () => {
        wrapperWidth = sliderRail.clientWidth;
        updateSliderVisual(currentRangeIndex);
      };
      updateSize();
      window.addEventListener('resize', updateSize);
      sliderThumb.addEventListener('mousedown', onDragStart);
      sliderThumb.addEventListener('touchstart', onDragStart);
      sliderRail.addEventListener('click', (e) => {
        if (isDragging) return;
        const idx = getNearestStep(e.clientX);
        setRangeByIndex(idx, true);
      });
    }

    // --- Eventos de tiers (override manual) ---
    function bindTierEvents() {
      tierExplorer.addEventListener('click', () => {
        allowAutoTier = false;
        if (currentTier !== 'explorer') {
          currentTier = 'explorer';
          updateTierButtonsActive();
          taglineTextEl.style.opacity = '0';
          setTimeout(() => {
            taglineTextEl.innerText = "Explorer: emprendedores, empezamos juntos.";
            taglineTextEl.style.opacity = '1';
          }, 150);
        }
      });
      tierPodium.addEventListener('click', () => {
        allowAutoTier = false;
        if (currentTier !== 'podium') {
          currentTier = 'podium';
          updateTierButtonsActive();
          taglineTextEl.style.opacity = '0';
          setTimeout(() => {
            taglineTextEl.innerText = "Podium: crecimiento asegurado, alianza estratégica.";
            taglineTextEl.style.opacity = '1';
          }, 150);
        }
      });
      tierChampion.addEventListener('click', () => {
        allowAutoTier = false;
        if (currentTier !== 'champion') {
          currentTier = 'champion';
          updateTierButtonsActive();
          taglineTextEl.style.opacity = '0';
          setTimeout(() => {
            taglineTextEl.innerText = "Champion: liderazgo y beneficios máximos.";
            taglineTextEl.style.opacity = '1';
          }, 150);
        }
      });
    }

    // CTA feedback
    const ctaBtn = document.getElementById('ctaBtn');
    ctaBtn.addEventListener('click', () => {
      if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
      alert("📞 Diagnóstico gratuito – Un asesor te contactará pronto.");
    });

    // Inicialización
    function init() {
      initSlider();
      bindTierEvents();
      currentRangeIndex = 2;
      currentTier = "champion";
      allowAutoTier = true;
      updateSliderVisual(2);
      updateTierButtonsActive();
      updateMetricsAndTagline(true);
    }
    init();
  </script>
</body>
</html>
