<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodiumBeer BI - Medallero Chile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="bg-black p-4 border-b border-yellow-600">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-yellow-500">PODIUM BEER BI</h1>
            <div id="status" class="text-xs text-green-400 font-mono">CONECTADO A SUPABASE</div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="md:col-span-2">
                <input type="text" id="searchBeer" placeholder="Buscar cervecería o estilo..." 
                    class="w-full p-4 rounded bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-yellow-500">
            </div>
            <button onclick="fetchData()" class="bg-yellow-600 hover:bg-yellow-700 text-black font-bold py-2 px-4 rounded transition">
                ACTUALIZAR DATOS
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 text-center">
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-yellow-500">
                <p class="text-gray-400 text-sm uppercase">Total Registros</p>
                <p id="total-rows" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-blue-500">
                <p class="text-gray-400 text-sm uppercase">Cervecerías Únicas</p>
                <p id="unique-beers" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-green-500">
                <p class="text-gray-400 text-sm uppercase">Medallas Oro</p>
                <p id="gold-medals" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-purple-500">
                <p class="text-gray-400 text-sm uppercase">Estilos</p>
                <p id="total-styles" class="text-3xl font-bold">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-xl">
                <h3 class="text-lg font-semibold mb-4">Top 10 Cervecerías (Medallas)</h3>
                <canvas id="chartBeers"></canvas>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl">
                <h3 class="text-lg font-semibold mb-4">Distribución por Estilos</h3>
                <canvas id="chartStyles"></canvas>
            </div>
        </div>

    </main>

    <script>
        // CONFIGURACIÓN DE CONEXIÓN (Aquí entran tus datos de secreto.env)
        const SUPABASE_URL = " https://znhezjtriutfzqgwuezq.supabase.co/rest/v1/ ";
        const SUPABASE_KEY = "sb_publishable_6k_jzLfPWH0fT6I_kjE0QQ_MI9honpR";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchData() {
            // Reemplaza 'nombre_de_tu_tabla' por el nombre real en Supabase
            let { data, error } = await supabase
                .from('bbdd_medallero_chile') 
                .select('*');

            if (error) {
                console.error("Error cargando datos:", error);
                document.getElementById('status').innerText = "ERROR DE CONEXIÓN";
                return;
            }

            updateDashboard(data);
        }

        function updateDashboard(data) {
            // Actualizar KPIs
            document.getElementById('total-rows').innerText = data.length.toLocaleString();
            
            const uniqueBeers = [...new Set(data.map(item => item.cerveceria))].length;
            document.getElementById('unique-beers').innerText = uniqueBeers;

            // Procesar datos para gráficos (Ejemplo rápido)
            renderCharts(data);
        }

        function renderCharts(data) {
            // Lógica para procesar el Top 10 y Estilos con Chart.js
            // ... (Se incluye lógica de conteo y renderizado)
            console.log("Datos listos para visualización");
        }

        // Carga inicial
        fetchData();
    </script>
</body>
</html>
