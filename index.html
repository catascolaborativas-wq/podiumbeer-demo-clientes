<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Podium Beer | Business Intelligence Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #f7c32f;
            --secondary: #E40F63;
            --bg-dark: #06232E;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: url('assets/bg_cerveceria.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .overlay { background: rgba(6, 35, 46, 0.85); min-height: 100vh; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { height: 50px; }
        
        /* Main Grid Structure for 3 BI Views */
        .bi-container { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        @media (min-width: 1024px) {
            .bi-container { grid-template-columns: 1fr 1fr; }
            .view-3 { grid-column: span 2; }
        }

        .view-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 { color: var(--primary); font-size: 1.2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* VISTA 1: PERFIL */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            border-radius: 10px; padding: 12px; color: white; outline: none;
        }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .profile-info { display: flex; align-items: center; gap: 15px; }
        .brewery-logo { width: 60px; height: 60px; border-radius: 50%; background: white; padding: 5px; }

        /* VISTA 2: SIMULADOR */
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .metric-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; }
        .metric-val { font-size: 1.5rem; font-weight: bold; color: var(--primary); display: block; }
        .metric-label { font-size: 0.8rem; color: #ccc; }
        .slider-container { margin: 30px 0; }
        input[type=range] { width: 100%; height: 6px; border-radius: 5px; background: #333; outline: none; accent-color: var(--primary); }

        /* VISTA 3: RADAR / OPORTUNIDADES */
        .radar-box { height: 300px; margin-bottom: 20px; }
        .opt-list { list-style: none; }
        .opt-item { 
            display: flex; justify-content: space-between; padding: 12px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem;
        }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .badge-high { background: #27ae60; }
        .badge-mid { background: #f39c12; }

        .cta-btn { 
            display: block; width: 100%; background: #25D366; color: white; 
            text-align: center; padding: 15px; border-radius: 15px; text-decoration: none;
            font-weight: bold; margin-top: 30px; 
        }
    </style>
</head>
<body>
    <div class="overlay">
        <header class="header">
            <img src="assets/logo_podiumbeer.png" alt="Podium Beer" class="logo">
            <div style="text-align: right">
                <p style="font-size: 0.7rem; color: var(--primary)">DASHBOARD DE ALIANZA</p>
                <p style="font-weight: bold">v1.2 Demo</p>
            </div>
        </header>

        <main class="bi-container">
            <!-- VISTA 1: PERFIL Y BÚSQUEDA -->
            <section class="view-card view-1">
                <h2>Vista 1: Perfil de Cervecería</h2>
                <div class="search-box">
                    <input type="text" id="brewerySearch" placeholder="Buscar cervecería (ej: Kross)..." value="Kross">
                    <button class="btn-main" id="btnAnalyze">ANALIZAR</button>
                </div>
                <div class="profile-info" id="profileInfo">
                    <div class="brewery-logo" id="logoPlaceholder" style="background: url('https://placehold.co/60x60/png?text=B') center center no-repeat; background-size: contain;"></div>
                    <div>
                        <h3 id="breweryName">Seleccione Cervecería</h3>
                        <p id="breweryLocation" style="font-size: 0.8rem; color: #ccc;">Región Metropolitana, Chile</p>
                    </div>
                </div>
            </section>

            <!-- VISTA 2: SIMULADOR DE IMPACTO -->
            <section class="view-card view-2">
                <h2>Vista 2: Simulador de Tier</h2>
                <div class="slider-container">
                    <p style="margin-bottom: 10px; font-size: 0.9rem;">Nivel de Alianza: <span id="tierLabel" style="color: var(--primary); font-weight: bold;">Plata</span></p>
                    <input type="range" id="tierSlider" min="1" max="4" step="1" value="2">
                </div>
                <div class="metrics-grid">
                    <div class="metric-item">
                        <span class="metric-val" id="valInversion">$0</span>
                        <span class="metric-label">Inversión</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-val" id="valRetorno">$0</span>
                        <span class="metric-label">Retorno Est.</span>
                    </div>
                </div>
            </section>

            <!-- VISTA 3: RADAR Y OPORTUNIDADES -->
            <section class="view-card view-3">
                <h2>Vista 3: Radar de Desempeño y Oportunidades</h2>
                <div style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                    <div class="radar-box">
                        <canvas id="radarChart"></canvas>
                    </div>
                    <div>
                        <ul class="opt-list" id="optList">
                            <!-- Oportunidades dinámicas -->
                        </ul>
                    </div>
                </div>
                <a href="#" class="cta-btn" id="btnWsp">WHATSAPP: SOLICITAR PLAN BI</a>
            </section>
        </main>
    </div>

    <script>
        const breweries = [
            { n: "Kross", l: "Curacaví", b: [80, 70, 90, 85, 75], o: ["Expansión Regional", "Canal Horeca High"] },
            { n: "Granizo", l: "Olmué", b: [90, 60, 85, 95, 70], o: ["Specialty Releases", "Direct-to-Consumer"] },
            { n: "Tamango", l: "Quilicura", b: [75, 95, 80, 80, 90], o: ["Cold Chain Optimization", "Export Ready"] }
        ];

        let current = breweries[0];
        let chart;

        function updateUI() {
            const tier = document.getElementById('tierSlider').value;
            const labels = ["Bronce", "Plata", "Oro", "Diamante"];
            document.getElementById('tierLabel').innerText = labels[tier-1];
            
            const factor = tier * 1.5;
            document.getElementById('valInversion').innerText = "$" + (factor * 500).toLocaleString() + "k";
            document.getElementById('valRetorno').innerText = "$" + (factor * 1200).toLocaleString() + "k";

            updateChart(tier);
            updateOpportunities();
        }

        function updateChart(tier) {
            const factor = 1 + (tier * 0.1);
            const projection = current.b.map(v => Math.min(100, v * factor));
            
            if (chart) chart.destroy();
            const ctx = document.getElementById('radarChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Calidad', 'Marketing', 'Distribución', 'Brand Equity', 'Digital'],
                    datasets: [{
                        label: 'Actual',
                        data: current.b,
                        borderColor: 'rgba(255,255,255,0.4)',
                        backgroundColor: 'transparent',
                        borderWidth: 2
                    }, {
                        label: 'Proyección Alianza',
                        data: projection,
                        borderColor: '#f7c32f',
                        backgroundColor: 'rgba(247, 195, 47, 0.2)',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#fff', font: { size: 10 } },
                            ticks: { display: false, min: 0, max: 100 }
                        }
                    },
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
        }

        function updateOpportunities() {
            const list = document.getElementById('optList');
            list.innerHTML = "";
            current.o.forEach(opt => {
                const li = document.createElement('li');
                li.className = "opt-item";
                li.innerHTML = `<span>${opt}</span> <span class="badge badge-high">ALTO IMPACTO</span>`;
                list.appendChild(li);
            });
        }

        document.getElementById('btnAnalyze').onclick = () => {
            const val = document.getElementById('brewerySearch').value.toLowerCase();
            const found = breweries.find(b => b.n.toLowerCase().includes(val));
            if (found) {
                current = found;
                document.getElementById('breweryName').innerText = found.n;
                document.getElementById('breweryLocation').innerText = found.l + ", Chile";
                updateUI();
            }
        };

        document.getElementById('tierSlider').oninput = updateUI;
        
        document.getElementById('btnWsp').onclick = (e) => {
            e.preventDefault();
            const msg = encodeURIComponent(`Hola Podium Beer, analicé mi cervecería ${current.n} y me interesa el Plan BI nivel ${document.getElementById('tierLabel').innerText}.`);
            window.open(`https://wa.me/569XXXXXXXX?text=${msg}`);
        };

        window.onload = updateUI;
    </script>
</body>
</html>
