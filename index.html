<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Simulador de Alianza | Podium Beer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f7c32f;
      --pink: #E40F63;
      --pink-dark: #C32263;
      --text-gray: #CFDEE0;
      /* Efecto ECO de Cristal: Brillo de espejo (compensación y dirección solicitada) */
      --glass-base: rgba(255, 255, 255, 0.03);
      --glass-border: 1px solid rgba(255, 255, 255, 0.2);
      --glass-shadow: -15px 15px 40px rgba(255, 255, 255, 0.08), 
                      0 10px 30px rgba(0, 0, 0, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* --- FONDO PROFESIONAL CON BLUR --- */
    .hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
    }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; filter: blur(3px) brightness(0.6); }
    
    .overlay-color {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, rgba(6, 35, 46, 0.5) 0%, rgba(0, 0, 0, 0.8) 100%);
      z-index: -1;
    }

    /* --- CONTENEDOR PRINCIPAL (CORRECCIÓN RESPONSIVE ANDROID 90%) --- */
    .app-container {
      width: 90%; /* Ocupa el 90% del ancho de pantalla en Android */
      max-width: 500px; /* Evita que se deforme en tablets */
      margin: 2rem auto;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header { text-align: center; color: #fff; margin-bottom: 0.5rem; }
    .h1-sim { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .h2-sim { font-size: 16px; font-weight: 500; color: var(--text-gray); margin-top: 5px; }

    /* --- CARDS GLASSMORPHISM (EFECTO ESPEJO ECO) --- */
    .glass-card {
      background: var(--glass-base);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 28px;
      padding: 1.8rem 1.5rem;
      border: var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    /* --- SLIDER CUSTOM --- */
    .slider-container { width: 100%; position: relative; }
    .slider-track {
      width: 100%; height: 12px; background: rgba(255,255,255,0.1);
      border-radius: 20px; position: relative; border: 1px solid rgba(255,255,255,0.05);
    }
    .slider-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--gold); border-radius: 20px;
      transition: width 0.3s ease;
    }
    input[type=range] {
      position: absolute; top: -6px; left: 0; width: 100%; height: 24px;
      appearance: none; background: transparent; outline: none; z-index: 5; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      appearance: none; width: 28px; height: 28px; background: #fff;
      border-radius: 50%; border: 3px solid var(--gold); box-shadow: 0 0 15px rgba(247, 195, 47, 0.5);
    }

    .slider-labels {
      display: flex; justify-content: space-between; margin-top: 15px; padding: 0 5px;
    }
    .slider-labels span { font-size: 10px; color: var(--text-gray); font-weight: 600; }

    /* --- BOTONES TIER (ANCHO COMPLETO) --- */
    .tier-buttons { display: flex; gap: 10px; width: 100%; }
    .tier-btn {
      flex: 1; padding: 12px 5px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.4); color: #fff;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: 0.3s;
    }
    .tier-btn svg { fill: var(--gold); width: 16px; height: 16px; }
    .tier-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      border-color: transparent;
      box-shadow: 0 8px 25px rgba(228, 15, 99, 0.5);
    }

    /* --- DASHBOARD DE METRICAS (IGUAL QUE LA IMAGEN GEMINI) --- */
    .metrics-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    }
    .metric-col {
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .metric-icon { width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
    .metric-icon svg { width: 100%; height: 100%; fill: var(--gold); }
    
    /* Corrección: Títulos en dos líneas centrados */
    .metric-label { 
      font-size: 11px; font-weight: 700; color: var(--text-gray); 
      line-height: 1.3; text-transform: uppercase; letter-spacing: 0.5px;
      min-height: 30px; /* Mantiene alineación */
    }
    .metric-value { font-size: 17px; font-weight: 800; color: #fff; margin-top: 6px; white-space: nowrap; }

    /* --- TAGLINE Y CTA --- */
    .tagline-container { margin-top: -0.5rem; text-align: center; }
    .tagline { 
      font-size: 11px; color: var(--text-gray); opacity: 0.8;
      font-style: italic; display: inline-flex; align-items: start; gap: 4px;
    }
    .tagline span { color: var(--gold); font-weight: bold; font-size: 14px; margin-top: -2px; }

    .cta-wrapper { display: flex; justify-content: center; margin-top: 10px; }
    .cta-button {
      background: linear-gradient(90deg, var(--pink), var(--pink-dark));
      color: #fff; border: none; width: 100%;
      padding: 18px; border-radius: 20px; font-weight: 800;
      font-size: 16px; cursor: pointer;
      box-shadow: 0 10px 30px rgba(228, 15, 99, 0.4);
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .cta-button:active { transform: scale(0.98); box-shadow: 0 5px 15px rgba(228, 15, 99, 0.3); }

    /* ===== DESKTOP LAYOUT (992px+) - Opcional para balancear ===== */
    @media (min-width: 992px) {
      .app-container { max-width: 1000px; display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
      .header, .cta-wrapper, .tagline-container { grid-column: span 2; }
      .tagline { text-align: center; width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

    <div class="glass-card">

          </div>
          <div class="metric-label">Inversión<br>Mensual</div>
          <div class="metric-value" id="v-inv">$1,200 USD</div>
        </div>
        
        <div class="metric-col">
          <div class="metric-icon">
            <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.99l1.5 1.5 6-6 4 4 6.38-6.38L22 12V6h-6z"/></svg>
          </div>
          <div class="metric-label">Optimización<br>Anual</div>
          <div class="metric-value" id="v-opt">$14,500 USD</div>

        <div class="metric-col">
          <div class="metric-icon">
            <svg viewBox="0 0 36 36"><path fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/><path fill="none" stroke="#f7c32f" stroke-width="3" stroke-dasharray="65, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831"/><text x="18" y="21.5" font-family="Inter" font-size="10" font-weight="800" fill="#f7c32f" text-anchor="middle">%</text></svg>
          </div>
          <div class="metric-label">ROI<br>Colaborativo</div>
          <div class="metric-value" id="v-roi">65%</div>
        </div>
      </div>
    </div>

    <div class="tagline-container">
      <p class="tagline"><span>*</span> Crecemos si tú creces: este presupuesto se ajusta a tu realidad...</p>
    </div>

    <div class="cta-wrapper">
      <button class="cta-button">Agenda tu diagnóstico gratuito</button>
    </div>
  </div>
