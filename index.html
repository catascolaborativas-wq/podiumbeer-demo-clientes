<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodiumBeer | Intelligence Tool</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
.container {max-width:1100px;margin:auto;padding:16px;}
h1,h2,h3{text-align:center;}

.row{display:flex;flex-wrap:wrap;margin:-8px;}
.col{padding:8px;width:100%;}
@media(min-width:768px){.col-6{width:50%;}}
@media(min-width:1024px){.col-4{width:33.33%;}}

.card{background:#1e293b;padding:16px;border-radius:12px;margin-bottom:16px;}

.kpi{font-size:20px;text-align:center;font-weight:bold;}

select,input{width:100%;padding:10px;margin-top:8px;}

.chart-container{position:relative;width:100%;height:300px;}
@media(min-width:768px){.chart-container{height:380px;}}

.resultado{text-align:center;font-size:18px;margin-top:10px;}
.insight{margin-top:10px;font-size:16px;text-align:center;}
</style>
</head>

<body>

<div class="container">

<h1>PodiumBeer</h1>
<h2>Inteligencia Comercial Cervecera</h2>

<!-- SELECTOR -->
<div class="card">
<h3>Selecciona tu cervecería</h3>
<select id="cerveceriaSelect"></select>
</div>

<!-- KPIs -->
<div class="row">
<div class="col col-4"><div class="card kpi" id="kpiC"></div></div>
<div class="col col-4"><div class="card kpi" id="kpiN"></div></div>
<div class="col col-4"><div class="card kpi" id="kpiR"></div></div>
</div>

<!-- GRAFICO -->
<div class="card">
<h3>Performance Competitivo 2025</h3>
<div class="chart-container">
<canvas id="chart"></canvas>
</div>
</div>

<!-- SIMULADOR -->
<div class="card">
<h3>Producción anual (hL)</h3>
<input type="range" id="prod" min="500" max="20000" step="500" value="1000">
<p id="prodVal">1000 hL</p>

<h3>Plan</h3>
<select id="plan">
<option value="1">Explorer</option>
<option value="1.5">Podium</option>
<option value="2.2">Champion</option>
</select>

<div class="resultado" id="resultado"></div>
<div class="insight" id="insight"></div>
</div>

</div>

<script>

/* ===== DATA (SIMULA CSV REAL) ===== */
const data = [
{c:"Tamango",score:9.5},{c:"Tamango",score:9.2},{c:"Tamango",score:9.8},
{c:"Tamango",score:9.1},{c:"Tamango",score:9.3},{c:"Tamango",score:9.0},
{c:"Tamango",score:9.4},{c:"Tamango",score:9.6},

{c:"Luther",score:8.2},{c:"Luther",score:7.5},{c:"Luther",score:6.8},
{c:"Luther",score:7.2},{c:"Luther",score:6.5},

{c:"Kross",score:5.2},{c:"Kross",score:4.9},{c:"Kross",score:5.5},
{c:"Kross",score:6.1}
];

/* ===== SETUP ===== */
const cervecerias = [...new Set(data.map(d=>d.c))];
const select = document.getElementById("cerveceriaSelect");

cervecerias.forEach(c=>{
  let op=document.createElement("option");
  op.value=c; op.text=c;
  select.appendChild(op);
});

/* ===== KPI ===== */
function calcularKPIs(cer){
  let c=0,n=0,r=0;
  data.filter(d=>d.c===cer).forEach(d=>{
    if(d.score>=9)c++;
    else if(d.score>=6)n++;
    else r++;
  });
  return {c,n,r};
}

/* ===== CHART ===== */
var ctx=document.getElementById("chart").getContext("2d");

var chart=new Chart(ctx,{
type:'bar',
data:{
labels:cervecerias,
datasets:[{
label:'Medallas de alto valor',
data:cervecerias.map(c=>calcularKPIs(c).c)
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
legend:{labels:{fontColor:"white"}},
scales:{
yAxes:[{ticks:{beginAtZero:true,fontColor:"white"}}],
xAxes:[{ticks:{fontColor:"white"}}]
}
}
});

/* ===== SIMULADOR + INSIGHT ===== */
function update(){

let cer=select.value;
let kpi=calcularKPIs(cer);

document.getElementById("kpiC").innerText=kpi.c+" Construye";
document.getElementById("kpiN").innerText=kpi.n+" Neutro";
document.getElementById("kpiR").innerText=kpi.r+" Ruido";

/* liderazgo */
let max=Math.max(...cervecerias.map(c=>calcularKPIs(c).c));
let lider=cervecerias.find(c=>calcularKPIs(c).c===max);

let gap=max-kpi.c;

/* simulador */
let prod=parseInt(document.getElementById("prod").value);
let factor=parseFloat(document.getElementById("plan").value);

let inversion=prod*0.8*factor;
let ajuste=1+(kpi.c*0.05); /* basado en desempeño real */
let retorno=inversion*4.5*ajuste;

document.getElementById("resultado").innerHTML=
"Inversión mensual: $"+Math.round(inversion)+" USD<br>"+
"Retorno anual: $"+Math.round(retorno)+" USD<br>"+
"Impacto: "+Math.round((retorno/inversion)*100)+"%";

/* insight dinámico */
let texto="";

if(cer===lider){
texto="Eres líder del mercado en construcción de marca. Estás capturando el máximo valor competitivo.";
}else{
texto="Estás "+gap+" medallas de alto valor bajo "+lider+". Existe una brecha directa en posicionamiento y captura de valor.";
}

document.getElementById("insight").innerText=texto;

}

/* eventos */
select.addEventListener("change",update);
document.getElementById("prod").addEventListener("input",function(){
document.getElementById("prodVal").innerText=this.value+" hL";
update();
});
document.getElementById("plan").addEventListener("change",update);

update();

</script>

</body>
</html>
