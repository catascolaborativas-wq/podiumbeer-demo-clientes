<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Simulador de Alianza | Podium Beer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
      background: #000;
      overflow-x: hidden;
    }

    /* --- FONDO CON IMAGEN + OVERLAY 57% + VIÑETA --- */
    .hero-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }
    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay-color {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #06232E;
      opacity: 0.57;
      z-index: -1;
    }
    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 0;
    }

    /* --- CONTENEDOR PRINCIPAL --- */
    .app-container {
      max-width: 390px;
      width: 100%;
      margin: 0 auto;
      padding: 44px 20px 40px 20px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Animación de entrada */
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-item {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    /* --- HEADER --- */
    .header {
      text-align: center;
    }
    .h1-sim {
      font-size: 32px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }
    .h2-sim {
      font-size: 18px;
      font-weight: 500;
      color: #CFDEE0;
      margin-top: 8px;
    }

    /* --- CONTENEDORES GLASS (slider y métricas) --- */
    .glass-card, .metrics-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 32px;
      padding: 16px;
    }

    /* --- SLIDER --- */
    .slider-container {
      width: 100%;
    }
    .slider-track-wrapper {
      position: relative;
      margin: 20px 8px 32px 8px;
    }
    .slider-rail {
      width: 100%;
      height: 6px;
      background: #1E3A4A;
      border-radius: 50px;
      position: relative;
      cursor: pointer;
    }
    .slider-fill {
      position: absolute;
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, #06232E 0%, #FFFFFF 100%);
      width: 0%;
      pointer-events: none;
      transition: width 0.1s ease-out;
    }
    .slider-thumb {
      position: absolute;
      width: 24px;
      height: 24px;
      background: #FFFFFF;
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 0 0 0px rgba(255,255,255,0.3);
      transition: box-shadow 0.1s ease, left 0.15s ease;
      z-index: 3;
    }
    .slider-thumb:active {
      cursor: grabbing;
      box-shadow: 0 0 0 6px rgba(255,255,255,0.25);
    }
    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      gap: 8px;
    }
    .slider-labels span {
      flex: 1;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: #CFDEE0;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    /* --- TIER BUTTONS (mismo ancho, pequeños, iconos dorados) --- */
    .tier-buttons {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }
    .tier-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 60px;
      padding: 6px 8px;
      cursor: pointer;
      transition: all 250ms ease;
      min-width: 0;
    }
    .tier-btn.active {
      background: linear-gradient(90deg, #E40F63, #C32263);
      border: 1.5px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 12px #811347, 0 4px 12px rgba(0,0,0,0.3);
      transform: scale(1.02) translateY(-2px);
    }
    .tier-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tier-icon svg {
      fill: #f7c32f;
      color: #f7c32f;
      width: 16px;
      height: 16px;
    }
    .tier-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #FFFFFF;
      white-space: nowrap;
    }

    /* --- TARJETA DE MÉTRICAS (iconos alineados, espaciado entre columnas) --- */
    .metrics-card {
      padding: 20px 12px;
    }
    .metrics-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;  /* más separación entre columnas */
    }
    .metric-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
      min-width: 0;
    }
    .metric-icon {
      height: 40px;  /* altura fija para alinear */
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .metric-icon svg {
      width: 32px;
      height: 32px;
      display: block;
    }
    .metric-label {
      font-size: 10px;
      font-weight: 700;
      color: #CFDEE0;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .metric-value {
      font-size: 16px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.2;
      white-space: nowrap;
    }
    /* Ajuste para pantallas muy pequeñas: reducir fuente de las etiquetas */
    @media (max-width: 360px) {
      .metric-label { font-size: 9px; }
      .metric-value { font-size: 14px; }
      .metrics-row { gap: 12px; }
    }

    /* --- TAGLINE (asterisco + texto original, pegado al contenedor de métricas) --- */
    .tagline-wrapper {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      margin-top: 0;      /* pegado al contenedor anterior */
      transition: opacity 0.3s ease;
    }
    .tagline-asterisk {
      font-size: 12px;
      font-weight: 600;
      color: #f7c32f;
    }
    .tagline-text {
      font-size: 10px;
      font-weight: 500;
      color: #CFDEE0;
      font-style: italic;
      text-align: right;
    }

    /* --- BOTÓN CTA centrado y más pequeño --- */
    .cta-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }
    .cta-button {
      background: linear-gradient(90deg, #E40F63, #C32263);
      border: none;
      border-radius: 60px;
      padding: 10px 24px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(228, 15, 99, 0.5);
      transition: transform 0.1s ease, filter 0.1s ease;
      width: auto;
      min-width: 220px;
    }
    .cta-button:active {
      transform: scale(0.97);
      filter: brightness(0.92);
    }
    .cta-text {
      font-size: 14px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    @media (max-width: 360px) {
      .cta-text { font-size: 12px; }
      .cta-button { padding: 8px 20px; min-width: 180px; }
    }
  </style>
</head>
<body>
  <div class="hero-bg">
    <img src="assets/bg_cerveceria.jpg" alt="Cervecería fondo">
  </div>
  <div class="overlay-color"></div>
  <div class="vignette"></div>

  <div class="app-container">
    <!-- Header -->
    <div class="header animate-item" style="animation-delay: 0ms;">
      <div class="h1-sim">Simulador de Alianza</div>
      <div class="h2-sim">¿Cuál es tu producción anual?</div>
    </div>

    <!-- Slider card -->
    <div class="glass-card animate-item" style="animation-delay: 80ms;">
      <div class="slider-container">
        <div class="slider-track-wrapper" id="sliderWrapper">
          <div class="slider-rail" id="sliderRail">
            <div class="slider-fill" id="sliderFill"></div>
          </div>
          <div class="slider-thumb" id="sliderThumb"></div>
        </div>
        <div class="slider-labels">
          <span>&lt;500 hl</span>
          <span>1000 hl</span>
          <span>5000 hl</span>
          <span>10000 hl</span>
          <span>≥20000 hl</span>
        </div>
      </div>
    </div>

    <!-- Tier buttons -->
    <div class="tier-buttons animate-item" style="animation-delay: 160ms;" id="tierButtonsContainer">
      <div class="tier-btn" data-tier="explorer" id="tierExplorer">
        <div class="tier-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3C9 5 7 8 7 11.5C7 14 8.5 16 10 17.5C11 18.5 12 19 12 21C12 19 13 18.5 14 17.5C15.5 16 17 14 17 11.5C17 8 15 5 12 3Z" fill="currentColor"/>
            <path d="M12 3C9.5 5.5 8 8.5 8 11.5C8 13.5 9 15 10.5 16.5C11.5 17.5 12 18.5 12 20" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <path d="M12 3C14.5 5.5 16 8.5 16 11.5C16 13.5 15 15 13.5 16.5C12.5 17.5 12 18.5 12 20" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <ellipse cx="12" cy="11.5" rx="1.8" ry="2.2" fill="currentColor"/>
          </svg>
        </div>
        <span class="tier-label">Explorer</span>
      </div>
      <div class="tier-btn" data-tier="podium" id="tierPodium">
        <div class="tier-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="3" width="8" height="3" fill="currentColor" rx="0.8"/>
            <circle cx="12" cy="11" r="7" fill="currentColor"/>
            <circle cx="12" cy="11" r="3.8" fill="rgba(0,0,0,0.3)"/>
          </svg>
        </div>
        <span class="tier-label">Podium</span>
      </div>
      <div class="tier-btn active" data-tier="champion" id="tierChampion">
        <div class="tier-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 5H17V15C17 17.5 14.5 19 12 19C9.5 19 7 17.5 7 15V5Z" fill="currentColor"/>
            <path d="M5 5H7V8H5V5Z" fill="currentColor"/>
            <path d="M19 5H17V8H19V5Z" fill="currentColor"/>
            <rect x="11" y="9" width="2" height="3" fill="#1A2A38"/>
            <polygon points="12,9.5 13,11 11,11" fill="#f7c32f"/>
            <path d="M10 19L14 19" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="tier-label">Champion</span>
      </div>
    </div>

    <!-- Tarjeta de métricas (con nuevo icono de moneda) -->
    <div class="metrics-card animate-item" style="animation-delay: 240ms;">
      <div class="metrics-row">
        <!-- Inversión mensual - icono de moneda con $ -->
        <div class="metric-col">
          <div class="metric-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="32" height="32">
              <circle cx="256" cy="256" r="200" fill="#f7c32f" stroke="#d4a81a" stroke-width="12"/>
              <text x="256" y="300" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#06232E" text-anchor="middle">$</text>
            </svg>
          </div>
          <div class="metric-label">Inversión mensual</div>
          <div class="metric-value" id="inversionValue">$1,200 USD</div>
        </div>
        <!-- Optimización anual -->
        <div class="metric-col">
          <div class="metric-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="32" height="32">
              <path fill="#f7c32f" d="M492,118H372c-11,0-20,9-20,20s9,20,20,20h81.7L323.3,288.3l-104.6-104.6c-7.8-7.8-20.5-7.8-28.3,0L10.4,363.6c-7.8,7.8-7.8,20.5,0,28.3c7.8,7.8,20.5,7.8,28.3,0l151.7-151.7l104.6,104.6c7.8,7.8,20.5,7.8,28.3,0L472,196.3V278c0,11,9,20,20,20s20-9,20-20V138C512,127,503,118,492,118z"/>
            </svg>
          </div>
          <div class="metric-label">Optimización anual</div>
          <div class="metric-value" id="optimizacionValue">$14,500 USD</div>
        </div>
        <!-- ROI colaborativo -->
        <div class="metric-col">
          <div class="metric-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="32" height="32">
              <path fill="#f7c32f" d="M437.3,325.2c-10.1-13.9-29.4-17-43.3-6.9c-13.9,10.1-17,29.4-6.9,43.3c23.6,32.5,36.9,71.7,36.9,112.4c0,105.9-86.1,192-192,192S40,579.9,40,474S126.1,282,232,282c40.7,0,79.9,13.3,112.4,36.9c13.9,10.1,33.2,7,43.3-6.9c10.1-13.9,7-33.2-6.9-43.3C335,231.8,285.1,214,232,214C88.4,214-28,330.4-28,474s116.4,260,260,260s260-116.4,260-260C492,421,474.2,371,441.3,325.2z M240,422c-11,0-20,9-20,20s9,20,20,20s20-9,20-20S251,422,240,422z M304,486c-11,0-20,9-20,20s9,20,20,20s20-9,20-20S315,486,304,486z M252.8,423.2c-10.1-13.9-7-33.2,6.9-43.3c13.9-10.1,33.2-7,43.3,6.9l80,110c10.1,13.9,7,33.2-6.9,43.3c-13.9,10.1-33.2,7-43.3-6.9L252.8,423.2z"/>
            </svg>
          </div>
          <div class="metric-label">ROI colaborativo</div>
          <div class="metric-value" id="roiValue">65%</div>
        </div>
      </div>
    </div>

    <!-- Tagline: asterisco + texto original (pegado al contenedor de métricas) -->
    <div class="tagline-wrapper animate-item" style="animation-delay: 320ms;" id="taglineWrapper">
      <span class="tagline-asterisk">*</span>
      <span class="tagline-text" id="taglineText">Crecemos si tú creces: este presupuesto se ajusta a tu realidad…</span>
    </div>

    <!-- Botón CTA centrado -->
    <div class="cta-wrapper animate-item" style="animation-delay: 400ms;">
      <button class="cta-button" id="ctaBtn">
        <span class="cta-text">Agenda tu diagnóstico gratuito</span>
      </button>
    </div>
  </div>

  <script>
    // Tabla de valores según rangos: 0:<500, 1:1000, 2:5000, 3:10000, 4:≥20000
    const metricsTable = [
      { inversion: "$150 USD", optimizacion: "$1,800 USD", roi: "30%", suggestedTier: "explorer", tagline: "Explorer: primeros pasos, acompañamiento personalizado." },
      { inversion: "$300 USD", optimizacion: "$3,600 USD", roi: "45%", suggestedTier: "explorer", tagline: "Explorer: creciendo con confianza." },
      { inversion: "$600 USD", optimizacion: "$7,200 USD", roi: "55%", suggestedTier: "podium", tagline: "Podium: escalando con soporte estratégico." },
      { inversion: "$1,200 USD", optimizacion: "$14,500 USD", roi: "65%", suggestedTier: "champion", tagline: "Champion: rendimiento superior, beneficios exclusivos." },
      { inversion: "$2,500 USD", optimizacion: "$30,000 USD", roi: "70%", suggestedTier: "champion", tagline: "Champion: volumen industrial, alianza premium." }
    ];

    // Elementos DOM
    const sliderRail = document.getElementById('sliderRail');
    const sliderThumb = document.getElementById('sliderThumb');
    const sliderFill = document.getElementById('sliderFill');
    const tierExplorer = document.getElementById('tierExplorer');
    const tierPodium = document.getElementById('tierPodium');
    const tierChampion = document.getElementById('tierChampion');
    const inversionEl = document.getElementById('inversionValue');
    const optimizacionEl = document.getElementById('optimizacionValue');
    const roiEl = document.getElementById('roiValue');
    const taglineTextEl = document.getElementById('taglineText');

    let currentRangeIndex = 3;  // 10000 hl
    let currentTier = "champion";
    let allowAutoTier = true;
    let isDragging = false;
    let wrapperWidth = 0;

    const stepPositions = [0, 0.25, 0.5, 0.75, 1];

    function updateSliderVisual(index) {
      const percent = stepPositions[index] * 100;
      sliderFill.style.width = `${percent}%`;
      const thumbLeft = (percent / 100) * wrapperWidth;
      sliderThumb.style.left = `${thumbLeft}px`;
    }

    function animateValue(element, startVal, endVal, isCurrency = true, suffix = "") {
      const duration = 600;
      const startTime = performance.now();
      const startNum = parseFloat(String(startVal).replace(/[^0-9.-]+/g, ""));
      let endNum = parseFloat(String(endVal).replace(/[^0-9.-]+/g, ""));
      if (isNaN(startNum) || isNaN(endNum)) {
        element.innerText = endVal;
        return;
      }
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        let progress = Math.min(1, elapsed / duration);
        const easeOut = 1 - Math.pow(1 - progress, 2);
        let currentNum = startNum + (endNum - startNum) * easeOut;
        let formatted;
        if (isCurrency) {
          formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(currentNum);
          formatted = formatted.replace('$', '$ ') + (suffix ? " " + suffix : "");
        } else {
          formatted = Math.round(currentNum) + (suffix ? suffix : "");
        }
        element.innerText = formatted;
        if (progress < 1) requestAnimationFrame(update);
        else element.innerText = endVal;
      }
      requestAnimationFrame(update);
    }

    function getCurrentMetrics() {
      return metricsTable[currentRangeIndex];
    }

    function updateMetricsAndTagline(resetTagline = true) {
      const newVals = getCurrentMetrics();
      const oldInversion = inversionEl.innerText;
      const oldOptim = optimizacionEl.innerText;
      const oldRoi = roiEl.innerText;
      animateValue(inversionEl, oldInversion, newVals.inversion, true, "USD");
      animateValue(optimizacionEl, oldOptim, newVals.optimizacion, true, "USD");
      animateValue(roiEl, oldRoi, newVals.roi, false, "%");
      if (resetTagline) {
        // Solo actualizamos si es por cambio de rango, pero el tagline fijo no se modifica.
        // Dejamos el texto original inmutable.
      }
    }

    function updateTierButtonsActive() {
      const btns = { explorer: tierExplorer, podium: tierPodium, champion: tierChampion };
      Object.keys(btns).forEach(tier => {
        if (tier === currentTier) btns[tier].classList.add('active');
        else btns[tier].classList.remove('active');
      });
    }

    function autoSelectTierFromRange() {
      if (allowAutoTier) {
        const suggested = metricsTable[currentRangeIndex].suggestedTier;
        if (suggested && suggested !== currentTier) {
          currentTier = suggested;
          updateTierButtonsActive();
        }
      }
    }

    function setRangeByIndex(index, fromUser = true) {
      if (index === currentRangeIndex && fromUser) return;
      currentRangeIndex = index;
      updateSliderVisual(currentRangeIndex);
      if (fromUser) {
        allowAutoTier = true;
        autoSelectTierFromRange();
      }
      updateMetricsAndTagline(true);
    }

    // Slider interactivo
    function getNearestStep(clientX) {
      const rect = sliderRail.getBoundingClientRect();
      let ratio = (clientX - rect.left) / rect.width;
      ratio = Math.min(Math.max(ratio, 0), 1);
      let distances = stepPositions.map(step => Math.abs(step - ratio));
      return distances.indexOf(Math.min(...distances));
    }

    function onDragStart(e) {
      isDragging = true;
      e.preventDefault();
      window.addEventListener('mousemove', onDragMove);
      window.addEventListener('mouseup', onDragEnd);
      window.addEventListener('touchmove', onDragMove);
      window.addEventListener('touchend', onDragEnd);
      sliderThumb.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
      if (!isDragging) return;
      let clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
      const rect = sliderRail.getBoundingClientRect();
      let ratio = (clientX - rect.left) / rect.width;
      ratio = Math.min(Math.max(ratio, 0), 1);
      sliderFill.style.width = `${ratio * 100}%`;
      let thumbX = ratio * wrapperWidth;
      sliderThumb.style.left = `${thumbX}px`;
    }

    function onDragEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      let clientX = e.clientX ?? (e.changedTouches ? e.changedTouches[0].clientX : 0);
      if (clientX === undefined) {
        const rect = sliderRail.getBoundingClientRect();
        clientX = rect.left + rect.width / 2;
      }
      const newIndex = getNearestStep(clientX);
      setRangeByIndex(newIndex, true);
      updateSliderVisual(currentRangeIndex);
      sliderThumb.style.cursor = 'grab';
      window.removeEventListener('mousemove', onDragMove);
      window.removeEventListener('mouseup', onDragEnd);
      window.removeEventListener('touchmove', onDragMove);
      window.removeEventListener('touchend', onDragEnd);
    }

    function initSlider() {
      const updateSize = () => {
        wrapperWidth = sliderRail.clientWidth;
        updateSliderVisual(currentRangeIndex);
      };
      updateSize();
      window.addEventListener('resize', updateSize);
      sliderThumb.addEventListener('mousedown', onDragStart);
      sliderThumb.addEventListener('touchstart', onDragStart);
      sliderRail.addEventListener('click', (e) => {
        if (isDragging) return;
        const idx = getNearestStep(e.clientX);
        setRangeByIndex(idx, true);
      });
    }

    function bindTierEvents() {
      tierExplorer.addEventListener('click', () => {
        allowAutoTier = false;
        if (currentTier !== 'explorer') {
          currentTier = 'explorer';
          updateTierButtonsActive();
        }
      });
      tierPodium.addEventListener('click', () => {
        allowAutoTier = false;
        if (currentTier !== 'podium') {
          currentTier = 'podium';
          updateTierButtonsActive();
        }
      });
      tierChampion.addEventListener('click', () => {
        allowAutoTier = false;
        if (currentTier !== 'champion') {
          currentTier = 'champion';
          updateTierButtonsActive();
        }
      });
    }

    const ctaBtn = document.getElementById('ctaBtn');
    ctaBtn.addEventListener('click', () => {
      if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
      alert("📞 Diagnóstico gratuito – Un asesor te contactará pronto.");
    });

    function init() {
      initSlider();
      bindTierEvents();
      currentRangeIndex = 3;
      currentTier = "champion";
      allowAutoTier = true;
      updateSliderVisual(3);
      updateTierButtonsActive();
      updateMetricsAndTagline(true);
      // Forzar el texto original del tagline (por si acaso)
      taglineTextEl.innerText = "Crecemos si tú creces: este presupuesto se ajusta a tu realidad…";
    }
    init();
  </script>
</body>
</html>
