<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodiumBeer BI - Senior Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --pb-primary: #06232e; --pb-magenta: #e32c6c; --pb-yellow: #f7c32f; --pb-cyan: #40E0D0;
        }
        body {
            background: linear-gradient(rgba(6,35,46,0.56), rgba(6,35,46,0.56)), url('assets/bg_cerveceria.jpg');
            background-size: cover; background-attachment: fixed;
            color: white; font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 15px;
        }
        .iac-bar { background: linear-gradient(90deg, var(--pb-cyan), var(--pb-yellow), var(--pb-magenta)); }
    </style>
</head>
<body class="p-4 lg:p-10">

    <header class="text-center max-w-4xl mx-auto mb-10">
        <h1 class="text-5xl font-black italic tracking-tighter uppercase">PodiumBeer BI</h1>
        <p class="text-yellow-400 font-bold tracking-[0.3em] text-sm mt-2">ANALYTICS ENGINE v1.0</p>
        
        <div class="mt-8 glass p-6">
            <input list="marcas" id="buscador" class="w-full bg-black/30 border-b-2 border-magenta p-4 text-2xl font-bold text-center outline-none" placeholder="INGRESE NOMBRE DE CERVECERÍA...">
            <datalist id="marcas"></datalist>
            <p id="status" class="text-[10px] mt-4 opacity-50 font-mono tracking-widest uppercase">Iniciando conexión con Supabase...</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass p-6 text-center">
                <h3 class="text-xs font-black uppercase mb-6 tracking-widest text-cyan-400">1. El Espejo (Radar de Autoridad)</h3>
                <canvas id="chartRadar"></canvas>
            </div>
            <div class="glass p-6 text-center">
                <h3 class="text-xs font-black uppercase mb-6 tracking-widest text-yellow-400">2. Mapa de Oportunidad (Bubble)</h3>
                <canvas id="chartBubble"></canvas>
            </div>
            <div class="glass p-6 text-center">
                <h3 class="text-xs font-black uppercase mb-6 tracking-widest text-magenta">3. Eficiencia por Metal</h3>
                <canvas id="chartDonut"></canvas>
            </div>
        </div>

        <section class="glass p-10">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-2xl font-black italic">ÍNDICE DE AUTORIDAD CERVECERA (IAC)</h2>
                <span id="iac-pct" class="text-5xl font-black text-magenta">0%</span>
            </div>
            <div class="w-full h-6 rounded-full bg-black/40 relative overflow-hidden">
                <div id="iac-fill" class="h-full iac-bar transition-all duration-1000" style="width: 0%"></div>
            </div>
            <div id="iac-msg" class="mt-4 text-sm italic opacity-80">Esperando selección de marca...</div>
        </section>
    </main>

    <script type="module">
        const SB_URL = import.meta.env.VITE_SUPABASE_URL;
        const SB_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY;
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        let RAW_DATA = [];

        async function init() {
            // Traemos las 8323 filas de una vez para que el BI funcione rápido
            const { data, error } = await _sb.from('bbdd_medallero_chile').select('*');
            if (error) {
                document.getElementById('status').innerText = "ERROR DE CARGA";
                return;
            }
            RAW_DATA = data;
            document.getElementById('status').innerText = `DATA ENGINE READY: ${data.length} REGISTROS CARGADOS`;

            const marcas = [...new Set(data.map(d => d.cerveceria))].sort();
            marcas.forEach(m => document.getElementById('marcas').innerHTML += `<option value="${m}">`);

            document.getElementById('buscador').addEventListener('change', (e) => runBI(e.target.value));
        }

        function runBI(marca) {
            const myData = RAW_DATA.filter(d => d.cerveceria === marca);
            if(myData.length === 0) return;

            // 1. LÓGICA RADAR (Autoridad Técnica)
            const puntos = myData.reduce((acc, r) => {
                if(r.premio.includes('Oro')) return acc + 3;
                if(r.premio.includes('Plata')) return acc + 2;
                return acc + 1;
            }, 0);
            
            updateRadar(myData, puntos);
            updateDonut(myData);
            updateIAC(myData.length, puntos);
            updateBubble();
        }

        function updateRadar(data, pts) {
            const ctx = document.getElementById('chartRadar');
            if(window.rChart) window.rChart.destroy();
            window.rChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Autoridad', 'Consistencia', 'Diversidad', 'Vigencia', 'Poder'],
                    datasets: [{
                        label: 'Marca',
                        data: [Math.min(pts*2, 100), (new Set(data.map(d => d.anio)).size / 10)*100, (new Set(data.map(d => d.estilo)).size / 20)*100, 80, 70],
                        borderColor: '#40E0D0', backgroundColor: 'rgba(64, 224, 208, 0.2)'
                    }]
                },
                options: { scales: { r: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false } } } }
            });
        }

        function updateDonut(data) {
            const ctx = document.getElementById('chartDonut');
            if(window.dChart) window.dChart.destroy();
            const oros = data.filter(d => d.premio.includes('Oro')).length;
            const platas = data.filter(d => d.premio.includes('Plata')).length;
            const bronces = data.filter(d => d.premio.includes('Bronce')).length;

            window.dChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Oro', 'Plata', 'Bronce'],
                    datasets: [{
                        data: [oros, platas, bronces],
                        backgroundColor: ['#f7c32f', '#cccccc', '#cd7f32'],
                        borderWidth: 0
                    }]
                }
            });
        }

        function updateIAC(count, pts) {
            const score = Math.min((pts / 150) * 100, 100);
            document.getElementById('iac-pct').innerText = score.toFixed(1) + "%";
            document.getElementById('iac-fill').style.width = score + "%";
            
            let msg = score > 70 ? "POTENCIAL CHAMPION: Dominio técnico superior." : "MARCA EN CRECIMIENTO: Foco en consistencia.";
            document.getElementById('iac-msg').innerText = msg;
        }

        function updateBubble() {
            const ctx = document.getElementById('chartBubble');
            if(window.bChart) window.bChart.destroy();
            // Lógica de Monopolios: Muestra 10 estilos al azar de la base de datos para visualización
            const estilos = [...new Set(RAW_DATA.map(d => d.estilo))].slice(0, 10);
            window.bChart = new Chart(ctx, {
                type: 'bubble',
                data: {
                    datasets: [{
                        label: 'Oportunidades',
                        data: estilos.map(() => ({ x: Math.random()*10, y: Math.random()*10, r: Math.random()*20 })),
                        backgroundColor: '#e32c6c'
                    }]
                }
            });
        }

        init();
    </script>
</body>
</html>
