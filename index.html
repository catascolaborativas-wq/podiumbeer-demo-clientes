<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador PodiumBeer</title>
  <style>
    /* 1. RESET Y VARIABLES GLOBALES */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
      background: #06232e; /* Color de respaldo */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #ffffff;
    }

    /* 2. CONTENEDOR PRINCIPAL (EL LIENZO) */
    .pb-body-wrapper {
      /* Reemplazar con la ruta real de la imagen bg_cerveceria.jpg */
      background-image: linear-gradient(rgba(6, 35, 46, 0.56), rgba(6, 35, 46, 0.56)), url('bg_cerveceria.jpg');
      background-size: cover;
      background-position: center;
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 3. CARD GLASSMORPHISM (IGUAL A LA IMAGEN) */
    .pb-glass-card {
      width: 100%;
      max-width: 550px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      padding: 35px;
      text-align: center;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 25px;
      font-weight: 600;
    }

    /* 4. SLIDER TRANSLÚCIDO */
    .slider-container {
      margin-bottom: 30px;
    }

    .pb-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      margin-bottom: 12px;
    }

    .pb-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .pb-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
    }

    /* 5. SELECTORES DE PLAN (PILLS) */
    .pills-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 35px;
    }

    .pill {
      flex: 1;
      padding: 12px 10px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .pill-inactive {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
    }

    .pill-active {
      background: #e32c6c;
      border: 1px solid transparent;
      color: #ffffff;
      box-shadow: 0px 5px 15px rgba(227, 44, 108, 0.4);
    }

    /* 6. PANEL DE MÉTRICAS HORIZONTAL */
    .metrics-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 35px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px 0;
    }

    .metric-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .metric-icon {
      font-size: 1.4rem;
      color: #f7c32f;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
    }

    .metric-label {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* 7. BOTÓN CTA CON BRILLO NEÓN */
    .pb-btn-cta {
      background-color: #e32c6c;
      color: #ffffff;
      border-radius: 50px;
      border: none;
      padding: 16px 32px;
      font-weight: bold;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      box-shadow: 0px 4px 20px 5px rgba(227, 44, 108, 0.4);
      text-decoration: none;
    }

    .pb-btn-cta:hover {
      transform: scale(1.03);
      box-shadow: 0px 4px 25px 8px rgba(227, 44, 108, 0.6);
    }

    .cta-text-hint {
      display: block;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 15px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="pb-body-wrapper">
    
    <div class="pb-glass-card">
      
      <h2>Simulador de Alianza</h2>

      <div class="slider-container">
        <input type="range" class="pb-slider" min="1" max="5" value="3">
        <div class="slider-labels">
          <span>≤1000 hl</span>
          <span>1001-5000</span>
          <span>5001-20000</span>
          <span>20001-50000</span>
          <span>>50000 hl</span>
        </div>
      </div>

      <div class="pills-container">
        <div class="pill pill-inactive">
          <span>🌱</span> EXPLORER
        </div>
        <div class="pill pill-active">
          <span>🏅</span> PODIUM
        </div>
        <div class="pill pill-inactive">
          <span>🏆</span> CHAMPION
        </div>
      </div>

      <div class="metrics-container">
        <div class="metric-item">
          <div class="metric-icon">💵</div>
          <div class="metric-value">$450 USD</div>
          <div class="metric-label">Inversión Mensual</div>
        </div>
        <div class="metric-item">
          <div class="metric-icon">📈</div>
          <div class="metric-value">$5,400 USD</div>
          <div class="metric-label">Optimización Anual</div>
        </div>
        <div class="metric-item">
          <div class="metric-icon">🎯</div>
          <div class="metric-value">320%</div>
          <div class="metric-label">Retorno (ROI)</div>
        </div>
      </div>

      <span class="cta-text-hint">💡 Crecemos si tú creces: este presupuesto se ajusta a tu realidad.</span>
      
      <a href="#" class="pb-btn-cta">
        <span>📲</span> Agenda tu diagnóstico gratuito
      </a>

    </div>

  </div>

</body>
</html>
