<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test CSV</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    canvas {
      max-width: 800px;
      margin: 40px auto;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <h1>Test CSV Medallero</h1>

  <canvas id="breweryChart"></canvas>

  <div id="status">Cargando...</div>

  <script>
    let chart;

    function log(msg) {
      const el = document.getElementById("status");
      el.innerText += "\n" + msg;
    }

    async function cargarCSV() {
      try {
        log("📥 Cargando CSV...");

        const response = await fetch('./BBDD_Medallero_Chile.csv');

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const text = await response.text();

        const lines = text.split('\n');
        const headers = lines[0].split(';');

        const data = [];

        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;

          const values = lines[i].split(';');
          const row = {};

          headers.forEach((h, idx) => {
            row[h.trim()] = values[idx] ? values[idx].trim() : '';
          });

          if (!row.cerveceria) continue;

          data.push(row);
        }

        log("✅ Registros: " + data.length);

        return data;

      } catch (err) {
        log("💥 Error: " + err.message);
        return [];
      }
    }

    function renderChart(data) {
      const counts = {};

      data.forEach(d => {
        const name = d.cerveceria;
        counts[name] = (counts[name] || 0) + 1;
      });

      const labels = Object.keys(counts).slice(0, 10);
      const values = labels.map(l => counts[l]);

      const ctx = document.getElementById("breweryChart");

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Medallas',
            data: values
          }]
        }
      });

      log("📊 Gráfico listo");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      log("🚀 Iniciando...");

      const data = await cargarCSV();

      if (data.length > 0) {
        renderChart(data);
      } else {
        log("❌ No hay datos");
      }
    });
  </script>

</body>
</html>
