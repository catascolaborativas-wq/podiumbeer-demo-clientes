<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PodiumBeer BI</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #06232e;
  color: white;
  padding: 20px;
}

input, select, button {
  padding: 10px;
  margin: 5px;
}

.chart {
  width: 100%;
  height: 400px;
  margin-top: 20px;
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<h2>PodiumBeer BI</h2>

<input list="cervecerias" id="inputCerveceria" placeholder="Cervecería">
<datalist id="cervecerias"></datalist>

<select id="selectPeriodo">
  <option value="Todos">Todos</option>
  <option>2024</option>
  <option>2023</option>
  <option>2022</option>
</select>

<button onclick="analizar()">Analizar</button>

<div id="ranking" class="chart"></div>
<div id="radar" class="chart"></div>
<div id="bubble" class="chart"></div>

<h3>Simulador</h3>
<input type="range" min="0" max="4" id="slider">
<select id="plan">
  <option value="explorer">Explorer</option>
  <option value="podium">Podium</option>
  <option value="champion">Champion</option>
</select>
<button onclick="simular()">Calcular</button>
<p id="resultado"></p>

<script>

let dataGlobal = [];

// 📥 CARGA CSV
Papa.parse("bbdd.csv", {
  download: true,
  header: true,
  complete: function(results) {
    dataGlobal = results.data;
    poblarDatalist();
  }
});

// 🔽 AUTOCOMPLETE
function poblarDatalist() {
  const lista = document.getElementById("cervecerias");

  const unicas = [...new Set(
    dataGlobal
      .filter(d => d.pais === "Chile")
      .map(d => d.cerveceria)
  )];

  unicas.forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;
    lista.appendChild(opt);
  });
}

// ⚙️ ANALIZAR
function analizar() {
  const nombre = document.getElementById("inputCerveceria").value;
  const periodo = document.getElementById("selectPeriodo").value;

  let data = dataGlobal.filter(d => d.pais === "Chile");

  data = data.filter(d => d.cerveceria === nombre);

  if (periodo !== "Todos") {
    data = data.filter(d => d.anio === periodo);
  }

  if (data.length === 0) {
    alert("Sin datos");
    return;
  }

  const conPuntos = data.map(d => {
    let p = 0;
    if (d.medalla_base === "Oro") p = 3;
    if (d.medalla_base === "Plata") p = 2;
    if (d.medalla_base === "Bronce") p = 1;
    return {...d, puntos: p};
  });

  renderRanking(conPuntos);
  renderRadar(conPuntos);
  renderBubble(conPuntos);
}

// 🏆 RANKING
function renderRanking(data) {
  const map = {};

  data.forEach(d => {
    map[d.cerveceria] = (map[d.cerveceria] || 0) + d.puntos;
  });

  const arr = Object.entries(map);

  const chart = echarts.init(document.getElementById("ranking"));

  chart.setOption({
    xAxis: { type: 'category', data: arr.map(a => a[0]) },
    yAxis: { type: 'value' },
    series: [{ type: 'bar', data: arr.map(a => a[1]) }]
  });
}

// 🕸️ RADAR (simplificado)
function renderRadar(data) {

  const valores = [
    data.length * 10,
    50,
    60,
    40,
    30
  ];

  const chart = echarts.init(document.getElementById("radar"));

  chart.setOption({
    radar: {
      indicator: [
        { name: 'Consistencia', max: 100 },
        { name: 'Dominancia', max: 100 },
        { name: 'Calidad', max: 100 },
        { name: 'Diversidad', max: 100 },
        { name: 'Visibilidad', max: 100 }
      ]
    },
    series: [{
      type: 'radar',
      data: [{ value: valores }]
    }]
  });
}

// 🫧 BUBBLE
function renderBubble(data) {

  const estilos = {};

  data.forEach(d => {
    if (!estilos[d.estilo]) {
      estilos[d.estilo] = { cervecerias: new Set(), oro: 0 };
    }
    estilos[d.estilo].cervecerias.add(d.cerveceria);
    if (d.medalla_base === "Oro") estilos[d.estilo].oro++;
  });

  const arr = Object.values(estilos).map(e => [
    e.cervecerias.size,
    e.oro,
    20
  ]);

  const chart = echarts.init(document.getElementById("bubble"));

  chart.setOption({
    xAxis: {},
    yAxis: {},
    series: [{
      type: 'scatter',
      symbolSize: d => d[2],
      data: arr
    }]
  });
}

// 🎚️ SIMULADOR
function simular() {
  const plan = document.getElementById("plan").value;
  const tramo = document.getElementById("slider").value;

  const base = {
    explorer: 19000,
    podium: 59000,
    champion: 149000
  };

  const factor = [1, 1.2, 1.5, 1.8, 2.2];

  const precio = base[plan] * factor[tramo];

  document.getElementById("resultado").innerText =
    "Precio: $" + precio;
}

</script>

</body>
</html>
